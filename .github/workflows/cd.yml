name: CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test

  package:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @petroglyph/api package
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: packages/api/lambda.zip

  deploy:
    needs: [build, package]
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: packages/api
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Upload lambda.zip to S3
        run: |
          aws s3 cp packages/api/lambda.zip s3://${{ secrets.TF_STATE_BUCKET }}/lambda.zip
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        working-directory: packages/infra
        run: |
          terraform init -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"
      - name: Terraform workspace
        working-directory: packages/infra
        run: |
          terraform workspace select production || terraform workspace new production
      - name: Terraform apply
        working-directory: packages/infra
        run: |
          terraform apply -auto-approve \
            -var="api_zip_s3_bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -var="api_zip_s3_key=lambda.zip"
      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name petroglyph-api-production \
            --s3-bucket ${{ secrets.TF_STATE_BUCKET }} \
            --s3-key lambda.zip

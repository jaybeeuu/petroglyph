name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm build

      - name: Cache build output
        uses: actions/cache/save@v4
        with:
          path: packages/*/dist
          key: build-${{ runner.os }}-${{ github.sha }}

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Format check
        run: pnpm format:check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Type check
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Restore build output
        uses: actions/cache/restore@v4
        with:
          path: packages/*/dist
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: Type check
        run: pnpm typecheck

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Restore build output
        uses: actions/cache/restore@v4
        with:
          path: packages/*/dist
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: Test
        run: pnpm test

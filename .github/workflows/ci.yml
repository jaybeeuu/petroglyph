name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile

  build:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/*.tsbuildinfo
          key: dist-${{ github.sha }}
      - run: pnpm build

  lint:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/*.tsbuildinfo
          key: dist-${{ github.sha }}
      - run: pnpm lint

  typecheck:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/*.tsbuildinfo
          key: dist-${{ github.sha }}
      - run: pnpm typecheck

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: hashicorp/setup-terraform@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache@v4
        with:
          path: |
            packages/*/dist
            packages/*/*.tsbuildinfo
          key: dist-${{ github.sha }}
      - run: pnpm test

  format-check:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.4.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            node_modules
            packages/*/node_modules
          key: deps-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm format:check
